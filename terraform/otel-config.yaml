receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:
  resource:
    attributes:
      - key: service.name
        value: claude-code
        action: upsert

exporters:
  googlemanagedprometheus:
  googlecloud:

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [googlemanagedprometheus]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [googlecloud]
